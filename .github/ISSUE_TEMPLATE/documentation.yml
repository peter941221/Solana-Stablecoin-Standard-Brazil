name: Documentation improvement
description: Request a README, docs, or runbook update.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Which file or section needs attention?
      placeholder: README.md quick start or docs/DEPLOYMENT.md mainnet workflow
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is missing or confusing?
      description: Describe the gap, ambiguity, or stale content.
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Suggested improvement
      description: Share the wording, examples, or diagrams you wish existed.
